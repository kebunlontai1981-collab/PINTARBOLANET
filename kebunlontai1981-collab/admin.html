<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel PINTARBOLA</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; }
        button { background: #ffd700; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Dashboard Admin PINTARBOLA</h2>
    
    <div class="form-group">
        <label>Skor Live (Contoh: 3 : 1)</label>
        <input type="text" id="skor" placeholder="3 : 1">
    </div>
    <div class="form-group">
        <label>Berita Utama</label>
        <textarea id="berita" rows="4" placeholder="Tulis berita terkini..."></textarea>
    </div>
    <button onclick="saveData()">Simpan Semua Perubahan</button>

    <script>
        // GANTI DENGAN KREDENSIAL JSONBIN ANDA
        const BIN_ID = "6a323756da38895dfece36ae";
        const MASTER_KEY = "YOUR_MASTER_KEY";

        async function saveData() {
            const data = {
                skor: document.getElementById('skor').value,
                berita: document.getElementById('berita').value
            };

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify(data)
            });
            alert('Data berhasil diupdate!');
        }
    </script>
</body>
</html>
