<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pertandingan & Prediksi Bola</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background:#0a0a0a; color:#fff; }
        .container { max-width:600px; margin:auto; padding:20px; }
        .fwc-box-container { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .logo-pintarbola { max-width: 180px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .fwc-match { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .fwc-score { font-size: 28px; font-weight: 800; color: #ffd700; }
        .news-section { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="fwc-box-container">
        <img src="https://images.linkcdn.cloud/V2/505/logo/logo-871244902.png" alt="PINTARBOLA" class="logo-pintarbola">
        
        <h2 style="color:#ffd700; font-size: 18px;">MATCHDAY LIVE</h2>
        
        <div class="fwc-match">
            <div class="fwc-team"><div id="nama-tim-A">Loading...</div></div>
            <div class="fwc-score-box"><div class="fwc-score" id="skor-live">0 : 0</div></div>
            <div class="fwc-team"><div id="nama-tim-B">Loading...</div></div>
        </div>
    </div>

    <div class="news-section">
        <h2 style="color:#ffd700; font-size: 18px; margin-bottom:10px;">BERITA BOLA TERKINI</h2>
        <p id="isi-berita">Memuat berita...</p>
    </div>
</div>

<script>
    const BIN_ID = "6a323756da38895dfece36ae";

    async function loadData() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
            const data = await res.json();
            
            document.getElementById('nama-tim-A').innerText = data.record.timA;
            document.getElementById('nama-tim-B').innerText = data.record.timB;
            document.getElementById('skor-live').innerText = data.record.skor;
            document.getElementById('isi-berita').innerText = data.record.berita;
        } catch (err) { console.error(err); }
    }
    
    loadData();
    setInterval(loadData, 5000);
</script>
</body>
</html>
